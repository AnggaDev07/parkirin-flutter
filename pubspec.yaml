description: "A solution for your everyday Parking!"

#----------- Publishing Settings ------------#
publish_to: "none"

#----------- Versioning Information ------------#
version: 1.0.0+1

#----------- Environment Settings ------------#
environment:
  sdk: ^3.5.3

#----------- Dependencies ------------#
dependencies:
  bcrypt: ^1.1.3
  cloud_firestore: ^5.4.4
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  curved_navigation_bar: 1.0.6
  equatable: ^2.0.5
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_performance: ^0.10.0+11
  firebase_storage: ^12.3.4
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.1
  geolocator: ^13.0.1
  get_it: ^8.0.0
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  lottie: ^3.1.2
  package_info_plus: ^4.0.0
  path: ^1.9.0
  provider: ^6.0.5
  pull_to_refresh: ^2.0.0
  rive: ^0.13.14
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0
  timeago: ^3.7.0
  url_launcher: ^6.3.1
  visibility_detector: ^0.4.0+2
  webview_flutter: ^4.10.0

#----------- Dev Dependencies ------------#
dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

#----------- Flutter Settings ------------#
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/animations/
    - assets/images/
    - assets/icons/
